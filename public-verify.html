<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SASP GAN Academy — Vérification publique</title>
  <style>
    :root{--bg:#09090b;--panel:#111113;--line:#25262b;--text:#f5f5f5;--muted:#a1a1aa;--gold:#fbbf24;--green:#86efac;--red:#fca5a5}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#111214,#09090b);color:var(--text)}
    .wrap{max-width:900px;margin:0 auto;padding:24px}
    .card{background:#0c0c0f;border:1px solid var(--line);border-radius:22px;padding:24px}
    .badge{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(251,191,36,.2);background:rgba(251,191,36,.08);color:#fcd34d;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
    .ok{color:var(--green)} .ko{color:var(--red)} .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">VÉRIFICATION PUBLIQUE</div>
      <h1 id="title" style="margin:12px 0 6px">Chargement...</h1>
      <div id="content" class="muted">Lecture du certificat...</div>
    </div>
  </div>

<script>
async function api(path){ const res=await fetch(path); const data=await res.json().catch(()=>({})); return {res,data}; }
async function init(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(!id){
    document.getElementById('title').textContent = 'Certificat introuvable';
    document.getElementById('content').textContent = 'ID manquant.';
    return;
  }
  const out = await api('/api?action=verify&id=' + encodeURIComponent(id));
  if(!out.data || !out.data.valid){
    document.getElementById('title').innerHTML = '<span class="ko">Certificat non valide</span>';
    document.getElementById('content').innerHTML = 'Aucune donnée officielle trouvée.';
    return;
  }
  const d = out.data;
  document.getElementById('title').innerHTML = '<span class="ok">Certificat officiel valide</span>';
  document.getElementById('content').innerHTML =
    '<strong>' + (d.name || 'N/A') + '</strong><br><br>' +
    'Référence : ' + (d.certificateNumber || 'N/A') + '<br>' +
    'Date : ' + (d.date || 'N/A') + '<br>' +
    'Signature : ' + (d.signature || 'N/A') + '<br>' +
    (d.comment ? ('Commentaire : ' + d.comment + '<br>') : '') +
    'Créé le : ' + (d.createdAt ? new Date(d.createdAt).toLocaleString('fr-FR') : 'N/A');
}
init();
</script>
</body>
</html>
