<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SASP GAN Academy — Dossier Agent</title>
  <style>
    :root{
      --bg:#09090b;--panel:#111113;--line:#25262b;--text:#f5f5f5;--muted:#a1a1aa;
      --gold:#fbbf24;--green:#86efac;--blue:#93c5fd;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top, rgba(251,191,36,.10), transparent 20%),linear-gradient(180deg,#111214,#09090b);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .card,.panel,.timeline-item{background:#0c0c0f;border:1px solid var(--line);border-radius:20px}
    .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:24px}
    .card,.panel{padding:22px}
    .badge{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(251,191,36,.2);background:rgba(251,191,36,.08);color:#fcd34d;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
    .muted{color:var(--muted)}
    .pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18);color:#fcd34d;font-size:11px;text-transform:uppercase;letter-spacing:.16em}
    .pill-blue{color:#bfdbfe;border-color:rgba(147,197,253,.2);background:rgba(147,197,253,.08)}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
    .timeline{display:grid;gap:12px;margin-top:18px}
    .timeline-item{padding:14px}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    button,a.btn{padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:#16171b;color:#fff;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .primary{background:var(--gold);color:#111;border:none}
    .qrbox{display:flex;align-items:center;justify-content:center;min-height:260px}
    .empty{padding:20px;border:1px dashed var(--line);border-radius:16px;color:var(--muted)}
    @media (max-width:1000px){.hero,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between;align-items:center">
      <div>
        <div class="badge">DOSSIER AGENT</div>
        <h1 id="agentName" style="margin:10px 0 6px">Chargement...</h1>
        <div class="muted" id="subtitle">SASP GAN Academy</div>
      </div>
      <div class="row">
        <button onclick="window.print()">Imprimer</button>
        <button class="primary" onclick="exportJson()">Exporter JSON</button>
      </div>
    </div>

    <div class="hero" style="margin-top:20px">
      <div class="card">
        <div class="row" style="justify-content:space-between;align-items:center">
          <div>
            <div class="pill" id="gradePill">Grade</div>
            <div class="muted" id="statusText" style="margin-top:8px">Statut</div>
          </div>
          <div class="pill pill-blue" id="divisionText">Division</div>
        </div>

        <div class="grid">
          <div class="panel">
            <strong>Matricule</strong><br>
            <span class="muted" id="matriculeText">N/A</span>
          </div>
          <div class="panel">
            <strong>Certificats</strong><br>
            <span class="muted" id="certCountText">0</span>
          </div>
          <div class="panel">
            <strong>Créé le</strong><br>
            <span class="muted" id="createdAtText">N/A</span>
          </div>
          <div class="panel">
            <strong>Promotions</strong><br>
            <span class="muted" id="promoCountText">0</span>
          </div>
        </div>
      </div>

      <div class="card qrbox">
        <div style="text-align:center">
          <div class="muted">QR dossier agent</div>
          <img id="qrImage" alt="QR Code" style="margin-top:12px;max-width:220px;width:100%" />
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:24px">
      <h2>Historique complet</h2>
      <div id="timeline" class="timeline">
        <div class="empty">Chargement...</div>
      </div>
    </div>
  </div>

<script>
let agentCache = null;

async function api(path){
  const res = await fetch(path);
  const data = await res.json().catch(() => ({}));
  return {res, data};
}

function escapeHtml(text){
  return String(text ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}

function exportJson(){
  if (!agentCache) return;
  const blob = new Blob([JSON.stringify(agentCache, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'agent_' + (agentCache.agent?.matricule || 'export') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

async function loadAgent(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id){
    document.getElementById('agentName').textContent = 'Agent introuvable';
    document.getElementById('timeline').innerHTML = '<div class="empty">ID manquant.</div>';
    return;
  }

  const out = await api('/api?action=agent_details&id=' + encodeURIComponent(id));
  if (!out.data || !out.data.ok){
    document.getElementById('agentName').textContent = 'Erreur';
    document.getElementById('timeline').innerHTML = '<div class="empty">' + escapeHtml(out.data?.error || 'Impossible de charger le dossier.') + '</div>';
    return;
  }

  agentCache = out.data;
  const agent = out.data.agent || {};
  const certs = Array.isArray(out.data.certificates) ? out.data.certificates : [];
  const promotions = Array.isArray(out.data.promotions) ? out.data.promotions : [];

  document.getElementById('agentName').textContent = agent.name || 'Sans nom';
  document.getElementById('subtitle').textContent = 'Dossier officiel SASP GAN Academy';
  document.getElementById('gradePill').textContent = agent.grade || 'Cadet';
  document.getElementById('statusText').textContent = 'Statut : ' + (agent.status || 'Actif');
  document.getElementById('divisionText').textContent = agent.division || 'GAN';
  document.getElementById('matriculeText').textContent = agent.matricule || 'N/A';
  document.getElementById('certCountText').textContent = String(agent.certCount || certs.length || 0);
  document.getElementById('createdAtText').textContent = agent.createdAt ? new Date(agent.createdAt).toLocaleString('fr-FR') : 'N/A';
  document.getElementById('promoCountText').textContent = String(promotions.length);

  const qrTarget = window.location.origin + window.location.pathname + '?id=' + encodeURIComponent(id);
  document.getElementById('qrImage').src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(qrTarget);

  const certTimeline = certs.map(c => `
    <div class="timeline-item">
      <span class="pill">${escapeHtml(c.mention || 'Certificat')}</span>
      <div style="margin-top:8px"><strong>${escapeHtml(c.certificateNumber || 'Sans numéro')}</strong></div>
      <div class="muted">${escapeHtml(c.date || 'N/A')} • ${escapeHtml(c.signature || 'N/A')}</div>
      ${c.comment ? `<div class="muted" style="margin-top:8px">${escapeHtml(c.comment)}</div>` : ''}
    </div>
  `).join('');

  const promoTimeline = promotions.map(p => `
    <div class="timeline-item">
      <span class="pill pill-blue">Promotion</span>
      <div style="margin-top:8px"><strong>${escapeHtml(p.fromGrade || 'N/A')} → ${escapeHtml(p.toGrade || 'N/A')}</strong></div>
      <div class="muted">${escapeHtml(p.reason || 'N/A')}</div>
      <div class="muted">${p.createdAt ? new Date(p.createdAt).toLocaleString('fr-FR') : 'N/A'}</div>
    </div>
  `).join('');

  document.getElementById('timeline').innerHTML = (certTimeline + promoTimeline) || '<div class="empty">Aucun historique.</div>';
}

loadAgent();
</script>
</body>
</html>
