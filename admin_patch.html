
<!-- ADD inside agent modal -->
<div id="agentCard" style="margin-top:15px;"></div>

<script>
// Render visual agent card
function renderAgentCard(agent){
  const box = document.getElementById('agentCard');
  box.innerHTML = `
    <div style="border:1px solid #333;padding:15px;border-radius:12px;background:#0b0b0f">
      <h3>SASP GAN ACADEMY</h3>
      <p><strong>${agent.name}</strong></p>
      <p>Matricule: ${agent.matricule || 'N/A'}</p>
      <p>Grade: ${agent.grade}</p>
      <p>Division: ${agent.division}</p>
      <p>Status: ${agent.status}</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(agent.id)}"/>
    </div>
  `;
}
</script>
