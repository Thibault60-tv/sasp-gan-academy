<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification — SASP GAN Academy</title>
  <style>
    body{
      margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(251,191,36,.12), transparent 18%),
        linear-gradient(180deg,#111214,#09090b)
    }
    .card{
      width:min(760px,92vw);background:linear-gradient(180deg,#131317,#0d0d10);
      border:1px solid #25262b;border-radius:30px;padding:30px;box-shadow:0 18px 42px rgba(0,0,0,.28)
    }
    .badge{
      display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(251,191,36,.22);
      background:rgba(251,191,36,.08);color:#fcd34d;font-size:12px;letter-spacing:.16em;text-transform:uppercase
    }
    h1{font-size:42px;margin:18px 0 8px}
    .muted{color:#a1a1aa;line-height:1.7}
    .valid{margin-top:18px;padding:18px;border-radius:18px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);color:#86efac}
    .invalid{margin-top:18px;padding:18px;border-radius:18px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .info{margin-top:18px;padding:18px;border-radius:18px;background:#09090b;border:1px solid #25262b}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Vérification Officielle</div>
    <h1>SASP GAN Academy</h1>
    <div class="muted">Contrôle d’authenticité d’un certificat officiel GAN.</div>
    <div id="result" class="info">Chargement...</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    fetch('/api?action=verify&id=' + encodeURIComponent(id || ''))
      .then(r => r.json())
      .then(d => {
        const box = document.getElementById('result');
        if (d.valid) {
          box.className = 'valid';
          box.innerHTML = '<strong>Certificat VALIDE</strong><br><br>' +
            'Référence : ' + (d.certificateNumber || 'N/A') + '<br>' +
            'Nom RP : ' + (d.name || 'N/A') + '<br>' +
            'Date : ' + (d.date || 'N/A') + '<br>' +
            'Signature : ' + (d.signature || 'N/A') + '<br>' +
            'Créé le : ' + (d.createdAt ? new Date(d.createdAt).toLocaleString('fr-FR') : 'N/A');
        } else {
          box.className = 'invalid';
          box.innerHTML = '<strong>Certificat INVALIDE</strong><br><br>Aucune entrée correspondante.';
        }
      })
      .catch(() => {
        const box = document.getElementById('result');
        box.className = 'invalid';
        box.innerHTML = '<strong>Erreur de vérification</strong>';
      });
  </script>
</body>
</html>
