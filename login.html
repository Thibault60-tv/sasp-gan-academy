<!DOCTYPE html>
<html><body style="background:black;color:white;text-align:center;padding-top:100px">
<h1>Connexion Admin</h1>
<input id="user"><br><br>
<input id="pass" type="password"><br><br>
<button onclick="login()">Connexion</button>
<script>
async function login(){
const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});
if(res.ok){location='/admin.html'}else{alert('Erreur')}
}
</script></body></html>
