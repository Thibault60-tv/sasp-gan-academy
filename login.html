<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif">
<div>
<h2>Login</h2>
<input id="u" placeholder="user"><br><br>
<input id="p" type="password" placeholder="pass"><br><br>
<button onclick="go()">Login</button>
<p id="msg"></p>
</div>

<script>
async function go(){
  const res = await fetch('/api?action=login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:u.value,password:p.value})
  });
  const d = await res.json();
  if(d.ok){
    window.location.href='/admin.html';
  }else{
    msg.innerText="Erreur login";
  }
}
</script>
</body>
</html>
