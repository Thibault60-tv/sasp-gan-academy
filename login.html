<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — SASP GAN Academy</title>
  <style>
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#111214,#09090b);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{width:min(430px,92vw);background:#111113;border:1px solid #25262b;border-radius:26px;padding:28px}
    h1{margin:0 0 8px;font-size:34px}
    p{color:#a1a1aa;line-height:1.6}
    input{width:100%;box-sizing:border-box;margin-top:14px;padding:15px 16px;border-radius:16px;border:1px solid #25262b;background:#09090b;color:#fff}
    button{width:100%;margin-top:16px;padding:15px 16px;border:none;border-radius:16px;background:#fbbf24;color:#111;font-weight:800;cursor:pointer}
    .msg{margin-top:14px;padding:12px 14px;border-radius:14px;display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion staff</h1>
    <p>Admin, Formateur ou Accueil.</p>
    <input id="username" placeholder="Identifiant" />
    <input id="password" type="password" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    async function login() {
      const msg = document.getElementById('msg');
      msg.style.display = 'none';
      const res = await fetch('/api?action=login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json().catch(()=>({}));
      if (res.ok && data.ok) {
        window.location.href = '/admin.html';
      } else {
        msg.textContent = data.error || 'Connexion impossible.';
        msg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
