<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>SASP GAN Academy — Badge RP</title><style>
:root{--gold:#fbbf24;--line:#2b2c33;--bg:#09090b;--text:#f5f5f5;--muted:#b0b0b8}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#111214,#09090b);color:var(--text);display:grid;place-items:center;min-height:100vh;padding:20px}.badge-card{width:min(900px,100%);display:grid;grid-template-columns:1.2fr .8fr;gap:18px;background:#0c0c0f;border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.35)}.panel{background:#111113;border:1px solid var(--line);border-radius:20px;padding:18px}.chip{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(251,191,36,.2);background:rgba(251,191,36,.08);color:#fcd34d;font-size:12px;letter-spacing:.16em;text-transform:uppercase}.muted{color:var(--muted)}.qr{display:flex;align-items:center;justify-content:center;min-height:260px}.name{font-size:34px;font-weight:800;margin:14px 0 8px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.meta .panel{min-height:90px}.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}button,a{padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:#16171b;color:#fff;font-weight:700;text-decoration:none;cursor:pointer}.primary{background:var(--gold);color:#111;border:none}@media (max-width:900px){.badge-card,.meta{grid-template-columns:1fr}}
</style></head><body><div class="badge-card"><div class="panel"><div class="chip">Badge RP officiel</div><div class="name" id="name">Chargement...</div><div class="muted">SASP GAN Academy • Division officielle</div><div class="meta"><div class="panel"><strong>Matricule</strong><br><span class="muted" id="matricule">N/A</span></div><div class="panel"><strong>Grade</strong><br><span class="muted" id="grade">N/A</span></div><div class="panel"><strong>Division</strong><br><span class="muted" id="division">N/A</span></div><div class="panel"><strong>Statut</strong><br><span class="muted" id="status">N/A</span></div></div><div class="row"><button onclick="window.print()">Imprimer</button><a id="openAgent" class="primary" href="#">Ouvrir dossier</a></div></div><div class="panel qr"><div style="text-align:center"><div class="muted">QR vérification dossier</div><img id="qr" alt="QR" style="margin-top:12px;max-width:240px;width:100%" /></div></div></div><script>
async function api(path){const res=await fetch(path);const data=await res.json().catch(()=>({}));return{res,data};}async function init(){const params=new URLSearchParams(window.location.search);const id=params.get('id');if(!id)return;document.getElementById('openAgent').href='/agent.html?id='+encodeURIComponent(id);const out=await api('/api?action=agent_details&id='+encodeURIComponent(id));if(!out.data||!out.data.ok)return;const a=out.data.agent||{};document.getElementById('name').textContent=a.name||'Sans nom';document.getElementById('matricule').textContent=a.matricule||'N/A';document.getElementById('grade').textContent=a.grade||'Cadet';document.getElementById('division').textContent=a.division||'GAN';document.getElementById('status').textContent=a.status||'Actif';const target=window.location.origin+'/agent.html?id='+encodeURIComponent(id);document.getElementById('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data='+encodeURIComponent(target);}init();
</script></body></html>
