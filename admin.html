<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — SASP GAN Academy</title>
  <style>
    :root{--bg:#09090b;--panel:#111113;--line:#25262b;--text:#f5f5f5;--muted:#a1a1aa;--gold:#fbbf24}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#111214,#09090b);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .badge{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid rgba(251,191,36,.2);background:rgba(251,191,36,.08);color:#fcd34d;font-size:12px;letter-spacing:.16em;text-transform:uppercase}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:24px}
    input{width:100%;margin-top:12px;background:#09090b;border:1px solid var(--line);border-radius:16px;color:#fff;padding:14px 16px}
    button{padding:14px 18px;border-radius:16px;border:1px solid var(--line);background:#15161a;color:#fff;font-weight:700;cursor:pointer}
    .primary{background:var(--gold);color:#111;border:none}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .msg{margin-top:12px;padding:12px 14px;border-radius:14px;display:none}
    .ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);color:#86efac}
    .err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
    .list{display:grid;gap:12px}
    .item{background:#09090b;border:1px solid var(--line);border-radius:16px;padding:14px}
    .muted{color:var(--muted)}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="badge">GTA RP Admin</div>
        <h1>SASP GAN Academy — Panel Admin</h1>
      </div>
      <div class="row">
        <button onclick="refreshAll()">Actualiser</button>
        <button onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Envoyer un certificat</h2>
        <input id="certName" placeholder="Nom RP" />
        <input id="certDate" placeholder="Date" value="11/04/2026" />
        <input id="certSignature" placeholder="Signature commandement" value="SASP Command" />
        <div class="row">
          <button class="primary" onclick="sendCertificate()">Envoyer sur Discord</button>
        </div>
        <div id="certMsg" class="msg"></div>
      </div>

      <div class="card">
        <h2>Journal d'actions</h2>
        <div id="logs" class="list"><div class="item muted">Chargement...</div></div>
      </div>

      <div class="card" style="grid-column:1 / -1">
        <h2>Candidatures reçues</h2>
        <div id="applications" class="list"><div class="item muted">Chargement...</div></div>
      </div>
    </div>
  </div>

  <script>
    async function api(path, options={}) {
      const res = await fetch(path, options);
      const data = await res.json().catch(()=>({}));
      if (res.status === 401) {
        window.location.href = '/login.html';
        return null;
      }
      return {res, data};
    }

    function setMsg(id, ok, text) {
      const el = document.getElementById(id);
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.textContent = text;
      el.style.display = 'block';
    }

    async function sendCertificate() {
      const payload = {
        name: document.getElementById('certName').value.trim(),
        date: document.getElementById('certDate').value.trim(),
        signature: document.getElementById('certSignature').value.trim()
      };
      const out = await api('/api/send-certificate', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      if (!out) return;
      setMsg('certMsg', !!out.data.ok, out.data.ok ? 'Certificat envoyé.' : (out.data.error || 'Erreur.'));
      refreshLogs();
    }

    async function refreshApplications() {
      const out = await api('/api/applications');
      if (!out) return;
      const box = document.getElementById('applications');
      if (!out.data.ok || !Array.isArray(out.data.items) || !out.data.items.length) {
        box.innerHTML = '<div class="item muted">Aucune candidature enregistrée.</div>';
        return;
      }
      box.innerHTML = out.data.items.map(item => `
        <div class="item">
          <strong>${item.candidateName || 'Sans nom'}</strong>
          <div class="muted">Âge RP: ${item.candidateAge || 'N/A'} • Discord: ${item.candidateDiscord || 'N/A'}</div>
          <div style="margin-top:8px">${item.candidateMotivation || ''}</div>
          <div class="muted" style="margin-top:8px">${new Date(item.createdAt).toLocaleString('fr-FR')}</div>
        </div>
      `).join('');
    }

    async function refreshLogs() {
      const out = await api('/api/logs');
      if (!out) return;
      const box = document.getElementById('logs');
      if (!out.data.ok || !Array.isArray(out.data.items) || !out.data.items.length) {
        box.innerHTML = '<div class="item muted">Aucune action enregistrée.</div>';
        return;
      }
      box.innerHTML = out.data.items.map(item => `
        <div class="item">
          <strong>${item.action}</strong>
          <div class="muted">${item.details || ''}</div>
          <div class="muted" style="margin-top:8px">${new Date(item.createdAt).toLocaleString('fr-FR')}</div>
        </div>
      `).join('');
    }

    async function logout() {
      await fetch('/api/logout', {method:'POST'});
      window.location.href = '/login.html';
    }

    function refreshAll() {
      refreshApplications();
      refreshLogs();
    }

    refreshAll();
  </script>
</body>
</html>
