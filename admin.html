<!DOCTYPE html>
<html><body style="background:black;color:white">
<h1>Panel Admin</h1>
<input id="name" placeholder="Nom"><br>
<button onclick="send()">Envoyer certificat</button>
<script>
async function send(){
await fetch('/api/send-certificate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.value})});
alert('Envoyé');
}
</script></body></html>
